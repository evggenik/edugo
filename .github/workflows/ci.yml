name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and run unit tests
        # EdugoApplicationTests.contextLoads is excluded: it's a full
        # @SpringBootTest that requires a real Postgres connection, which
        # this pipeline doesn't provide yet. Revisit once integration tests
        # (e.g. Testcontainers) are added to the pipeline.
        run: mvn test --batch-mode -Dtest='!EdugoApplicationTests'
